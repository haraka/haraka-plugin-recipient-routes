name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CI: true

jobs:
  lint:
    uses: haraka/.github/.github/workflows/lint.yml@master
    permissions:
      contents: read

  test:
    needs: [lint]
    uses: haraka/.github/.github/workflows/ubuntu.yml@master
    permissions:
      contents: read
